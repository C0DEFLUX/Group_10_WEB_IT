/* ---------- Global ---------- */
:root {
    --bg: #f4f6fb;
    --text: #1f2937;
    --muted: #6b7280;
    --card: #ffffff;
    --nav: #111827;
    --nav-scrolled: #050816;
    --accent: #2563eb;
    --accent-dark: #1d4ed8;
    --footer: #0b1220;
    --footer-hover: #16213a;
}

body.dark-theme {
    --bg: #0f172a;
    --text: #e5e7eb;
    --muted: #cbd5e1;
    --card: #1e293b;
    --nav: #020617;
    --nav-scrolled: #000000;
    --accent: #60a5fa;
    --accent-dark: #3b82f6;
    --footer: #020617;
    --footer-hover: #111827;
}

* {
    box-sizing: border-box;
}

body {
    font-family: Arial, Helvetica, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    transition: background 0.25s ease, color 0.25s ease;
}

.layout {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

.inner-page {
    padding-top: 76px;
}

a {
    color: inherit;
    text-decoration: none;
}

h1,
h2,
h3 {
    line-height: 1.2;
}

.text-muted-custom {
    color: var(--muted);
}

.card,
.form-control {
    background-color: var(--card);
    color: var(--text);
}

.card {
    border-radius: 16px;
}

.form-control {
    border-color: rgba(107, 114, 128, 0.35);
}

.form-control:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 0.2rem rgba(37, 99, 235, 0.15);
}

/* ---------- Navigation ---------- */
.site-header {
    background: var(--nav);
}

.navbar {
    background: var(--nav);
    transition: background-color 0.25s ease, box-shadow 0.25s ease;
}

.navbar.navbar-scrolled {
    background: var(--nav-scrolled);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
}

.navbar .nav-link {
    border-radius: 8px;
    padding-left: 0.75rem;
    padding-right: 0.75rem;
}

.navbar .nav-link:hover,
.navbar .nav-link.active {
    background: rgba(255, 255, 255, 0.14);
}

/* ---------- Hero / Jumbotron-style section ---------- */
.hero {
    min-height: 72vh;
    padding-top: 92px;
    padding-bottom: 4rem;
    background:
        linear-gradient(rgba(17, 24, 39, 0.68), rgba(17, 24, 39, 0.68)),
        url('../images/hero.svg');
    background-size: cover;
    background-position: center;
}

.hero .btn,
.btn-primary {
    background-color: var(--accent);
    border-color: var(--accent);
}

.hero .btn:hover,
.btn-primary:hover {
    background-color: var(--accent-dark);
    border-color: var(--accent-dark);
}

.feature-card,
.member-card,
.service-card {
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.feature-card:hover,
.member-card:hover,
.service-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 26px rgba(0, 0, 0, 0.12) !important;
}

/* ---------- About ---------- */
.member-card img {
    height: 180px;
    object-fit: cover;
}

.timeline {
    padding-left: 1.2rem;
}

.timeline li {
    margin: 0.45rem 0;
}

/* ---------- Services ---------- */
.service-icon {
    height: 170px;
    object-fit: contain;
    padding: 1.2rem;
    background: rgba(37, 99, 235, 0.08);
}

.badge-category {
    background: rgba(37, 99, 235, 0.12);
    color: var(--accent);
}

/* ---------- Contact ---------- */
.contact-details li {
    margin-bottom: 0.55rem;
}

.alert {
    margin-bottom: 0;
}

/* ---------- Footer ---------- */
.site-footer {
    background: var(--footer);
    color: white;
    transition: background-color 0.25s ease;
}

.site-footer.footer-hovered {
    background: var(--footer-hover);
}

.social a {
    color: white;
}

.social a:hover {
    text-decoration: underline;
}

@media (max-width: 991px) {
    .navbar-collapse {
        padding-top: 1rem;
    }

    .navbar .btn {
        width: 100%;
    }
}

@media (max-width: 560px) {
    .hero {
        min-height: 64vh;
    }

    .hero h1 {
        font-size: 2rem;
    }

    .hero .btn {
        width: 100%;
    }
}
